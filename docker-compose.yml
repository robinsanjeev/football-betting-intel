version: '3.8'
services:
  football-intel:
    build: .
    container_name: football-intel
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - ./config:/app/football_intel/config
      - ./data:/app/football_intel/data
    environment:
      - TZ=America/Los_Angeles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
